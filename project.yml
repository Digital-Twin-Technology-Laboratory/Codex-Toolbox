name: ShowCodexIQ
options:
  bundleIdPrefix: io.github.zzzzzzjw
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
    VERSIONING_SYSTEM: apple-generic
configs:
  Debug: debug
  Release: release
targets:
  ShowCodexIQCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/ShowCodexIQCore
    settings:
      base:
        PRODUCT_NAME: ShowCodexIQCore
        DEFINES_MODULE: YES
  ShowCodexIQ:
    type: application
    platform: macOS
    configFiles:
      Debug: Sources/ShowCodexIQ/Config/Version.xcconfig
      Release: Sources/ShowCodexIQ/Config/Version.xcconfig
    sources:
      - path: Sources/ShowCodexIQ
        excludes:
          - Config/Info.plist
    resources:
      - path: Sources/ShowCodexIQ/Resources
    info:
      path: Sources/ShowCodexIQ/Config/Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        ShowCodexIQReleaseVersion: $(SHOW_CODEX_IQ_RELEASE_VERSION)
    dependencies:
      - target: ShowCodexIQCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.ShowCodexIQ
        PRODUCT_NAME: Show Codex IQ
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ShowCodexIQIcon
  ShowCodexIQTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ShowCodexIQTests
    resources:
      - path: Tests/ShowCodexIQTests/Fixtures
    dependencies:
      - target: ShowCodexIQCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.ShowCodexIQTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ShowCodexIQ:
    build:
      targets:
        ShowCodexIQ: all
        ShowCodexIQTests: [test]
    test:
      targets:
        - ShowCodexIQTests
