name: CodexToolbox
options:
  bundleIdPrefix: io.github.zzzzzzjw
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
    VERSIONING_SYSTEM: apple-generic
configs:
  Debug: debug
  Release: release
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.2
targets:
  CodexToolboxCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/CodexToolboxCore
    settings:
      base:
        PRODUCT_NAME: CodexToolboxCore
        DEFINES_MODULE: YES
        OTHER_LDFLAGS: -lsqlite3
  CodexToolbox:
    type: application
    platform: macOS
    configFiles:
      Debug: Sources/CodexToolbox/Config/Version.xcconfig
      Release: Sources/CodexToolbox/Config/Version.xcconfig
    sources:
      - path: Sources/CodexToolbox
        excludes:
          - Config/Info.plist
    resources:
      - path: Sources/CodexToolbox/Resources
    info:
      path: Sources/CodexToolbox/Config/Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        CodexToolboxReleaseVersion: $(CODEX_TOOLBOX_RELEASE_VERSION)
        SUFeedURL: https://github.com/Digital-Twin-Technology-Laboratory/Codex-Toolbox/releases/latest/download/appcast.xml
        SUPublicEDKey: $(SPARKLE_PUBLIC_ED_KEY)
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: true
        SUScheduledCheckInterval: 86400
    dependencies:
      - target: CodexToolboxCore
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.ShowCodexIQ
        PRODUCT_NAME: Codex Toolbox
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: CodexToolboxIcon
  CodexToolboxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CodexToolboxTests
    resources:
      - path: Tests/CodexToolboxTests/Fixtures
    dependencies:
      - target: CodexToolboxCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.CodexToolboxTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CodexToolbox:
    build:
      targets:
        CodexToolbox: all
        CodexToolboxTests: [test]
    test:
      targets:
        - CodexToolboxTests
